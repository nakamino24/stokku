name: stokku

services:
  postgres:
    image: postgres:16-alpine
    container_name: stokku-db
    environment:
      POSTGRES_USER: stokku
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stokku}
      POSTGRES_DB: stokku
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stokku"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      target: api
      cache_from:
        - stokku-api:latest
    container_name: stokku-api
    ports:
      - "${API_PORT:-4000}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://stokku:${POSTGRES_PASSWORD:-stokku}@postgres:5432/stokku
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
      cache_from:
        - stokku-web:latest
    container_name: stokku-web
    ports:
      - "${WEB_PORT:-3000}:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
