name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 18
  PNPM_VERSION: 8.6.0
  DATABASE_URL: postgresql://stokku:stokku@localhost:5432/stokku-test

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - name: Typecheck API
        run: pnpm --filter @stokku/api exec tsc --noEmit --skipLibCheck

      - name: Typecheck Web
        run: pnpm --filter @stokku/web exec tsc --noEmit --skipLibCheck

      - name: Typecheck packages
        run: pnpm --filter @stokku/database exec tsc --noEmit --skipLibCheck

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stokku
          POSTGRES_PASSWORD: stokku
          POSTGRES_DB: stokku-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @stokku/database exec prisma generate

      - name: Run Prisma Migrations
        run: pnpm --filter @stokku/database exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Seed Database
        run: pnpm --filter @stokku/database exec prisma db seed
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run API Tests
        run: pnpm --filter @stokku/api test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run Web Tests
        run: pnpm --filter @stokku/web test
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Build Docker image (API)
        run: docker build --target api -t stokku/api:ci .

      - name: Build Docker image (Web)
        run: docker build --target web -t stokku/web:ci .
